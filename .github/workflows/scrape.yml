name: Archive APS & SRP Outages

on:
  schedule:
    # Every hour at minute 7 to avoid peak scheduler traffic
    - cron: "7 * * * *"

  # Allow manual runs from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python -m scripts.run

      - name: Commit and push new snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Archive outage snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
