name: Archive Arizona Power Outages

on:
  schedule:
    # Every hour at minute 7 to avoid peak scheduler traffic
    - cron: "7 * * * *"

  # Allow manual runs from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

# Do not let two archive jobs race while committing snapshots.
concurrency:
  group: outage-archive-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # NISC outage maps are rendered in a browser before their public data
      # can be read by the Trico, Mohave, and Navopache providers.
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        id: scrape
        run: |
          python -m scripts.run

      - name: Commit and push new snapshots
        # Preserve snapshots from successful providers if another provider fails.
        if: ${{ always() && steps.scrape.outcome != 'skipped' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Archive outage snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
