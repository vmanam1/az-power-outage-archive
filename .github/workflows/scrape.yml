name: Archive Arizona Power Outages

on:
  schedule:
    # Every hour at minute 7 to avoid peak scheduler traffic
    - cron: "7 * * * *"

  # Allow manual runs from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write
  issues: write

# Do not let two archive jobs race while committing snapshots.
concurrency:
  group: outage-archive-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # NISC outage maps are rendered in a browser before their public data
      # can be read by the Trico, Mohave, and Navopache providers.
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        id: scrape
        run: |
          python -m scripts.run

      - name: Commit and push new snapshots
        # Preserve snapshots from successful providers if another provider fails.
        if: ${{ always() && steps.scrape.outcome != 'skipped' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            mst_time="$(TZ=America/Phoenix date '+%Y-%m-%d %H:%M MST')"
            git commit -m "Archive outage snapshot ${mst_time}"
            git push
          fi

      - name: Open or update failure alert
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Outage archive workflow failure";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              `The hourly outage archive failed on **${context.ref}**.`,
              "",
              `Run: ${runUrl}`,
              `Commit: ${context.sha}`,
              "",
              "Successful providers may still have committed snapshots. Check the run logs for the failed provider names."
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find(
              issue => !issue.pull_request && issue.title === title
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }

      - name: Close recovered failure alert
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Outage archive workflow failure";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find(
              issue => !issue.pull_request && issue.title === title
            );

            if (existing) {
              const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Recovered successfully: ${runUrl}`
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed",
                state_reason: "completed"
              });
            }
